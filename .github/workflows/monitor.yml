name: 鏈哄満鑺傜偣鑷姩鐩戞祴

on:
  schedule:
    # 姣?30 鍒嗛挓鎵ц涓€娆★紙UTC 鏃堕棿锛?    - cron: '*/30 * * * *'
  workflow_dispatch:  # 鏀寔鎵嬪姩瑙﹀彂

jobs:
  monitor:
    name: 鐩戞祴鏈哄満鍙敤鎬?    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 妫€鍑轰唬鐮?        uses: actions/checkout@v4

      - name: 閰嶇疆 Python 鐜
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 瀹夎渚濊禆
        run: pip install -r monitor/requirements.txt

      - name: 鎵ц鐩戞祴鑴氭湰
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python monitor/check.py

      - name: 涓婁紶鐩戞祴鏃ュ織锛堜緵璋冭瘯锛?        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-log-${{ github.run_id }}
          path: monitor/logs/
          retention-days: 7
